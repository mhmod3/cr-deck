<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>منشئ التشكيلات</title>
    <style>
        /* ===== الخطوط ===== */
        @import url('https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@400;500;600;700;800;900&display=swap');

        @font-face {
            font-family: 'Adobe Arabic';
            src: url('https://raw.githubusercontent.com/mhmod3/Sub-RTL-Fix/refs/heads/main/22016-adobearabic.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ===== إعادة ضبط ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-color: #2a6fa8 #0a2338;
        }

        body {
            font-family: 'Cairo', 'Adobe Arabic', 'Segoe UI', system-ui, sans-serif;
            color: #eaf4ff;
            padding: 1.2rem 0.7rem 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
            font-size: clamp(1rem, 1.4vw, 1.2rem);
            direction: rtl;
            unicode-bidi: embed;
            position: relative;
            background:
                repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 22px, rgba(255,255,255,0) 22px 44px),
                radial-gradient(ellipse at 50% -10%, #2f7fbd 0%, #1a5686 35%, #0c3355 65%, #061c30 100%);
            background-attachment: fixed;
        }

        /* textura de estrellas doradas sutiles en el fondo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(rgba(255, 214, 92, 0.10) 1.5px, transparent 1.5px),
                radial-gradient(rgba(255, 214, 92, 0.06) 1px, transparent 1px);
            background-size: 90px 90px, 55px 55px;
            background-position: 0 0, 25px 35px;
            z-index: 0;
        }

        /* ===== شاشة التحميل ===== */
        #loadingScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background:
                repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 22px, rgba(255,255,255,0) 22px 44px),
                radial-gradient(ellipse at 50% -10%, #2f7fbd 0%, #1a5686 35%, #0c3355 65%, #061c30 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            font-family: 'Cairo', 'Adobe Arabic', 'Segoe UI', system-ui, sans-serif;
            direction: rtl;
        }
        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loadingContent {
            text-align: center;
            max-width: 320px;
            width: 90%;
            padding: 1.6rem 1.3rem;
            background: linear-gradient(180deg, #1d5f92, #123a5c);
            border: 3px solid #ffd166;
            border-radius: 18px;
            box-shadow: 0 8px 0 #0a2338, 0 12px 24px rgba(0,0,0,0.5), inset 0 0 18px rgba(0,0,0,0.25);
        }
        #loadingText {
            font-family: 'Lalezar', 'Cairo', sans-serif;
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            color: #ffe27a;
            text-shadow: 0 2px 0 #7a4a00, 0 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 0.9rem;
            letter-spacing: 0.5px;
        }
        #loadingProgress {
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            color: #bfe0ff;
            margin-bottom: 0.6rem;
            direction: ltr;
            display: inline-block;
            font-weight: 700;
        }
        #loadingBar {
            width: 100%;
            height: 12px;
            background: #0a2338;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #06182a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        #loadingBarFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(180deg, #ffe27a, #ffb200);
            border-radius: 10px;
            transition: width 0.25s ease;
            box-shadow: 0 0 8px rgba(255, 178, 0, 0.6);
        }
        #loadingError {
            margin-top: 1.2rem;
            color: #ff8a80;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            display: none;
        }
        #loadingError.visible {
            display: block;
        }
        #loadingRetryBtn {
            margin-top: 0.6rem;
            background: #a52a2a;
            border: 2px solid #ffb3ab;
            color: #fff;
            padding: 0.35rem 1.3rem;
            font-size: clamp(0.85rem, 1vw, 0.95rem);
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            transition: background 0.2s, border-color 0.2s;
            display: none;
        }
        #loadingRetryBtn.visible {
            display: inline-block;
        }
        #loadingRetryBtn:hover {
            background: #c23a3a;
        }

        /* ===== الحاوية الرئيسية ===== */
        .container {
            max-width: 750px;
            width: 100%;
            direction: rtl;
            unicode-bidi: embed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ===== الشعار / العنوان بأسلوب Clash Royale ===== */
        .title-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.6rem;
        }

        .title-banner h1 {
            font-family: 'Lalezar', 'Cairo', sans-serif;
            font-weight: 400;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            text-align: center;
            letter-spacing: 1px;
            color: #ffe27a;
            background: linear-gradient(180deg, #fff3c4 0%, #ffd54a 45%, #ff9d00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 0 #7a3f00) drop-shadow(0 4px 6px rgba(0,0,0,0.55));
            padding: 0.2rem 0;
        }

        .sub {
            color: #bfe0ff;
            font-size: clamp(0.95rem, 1.2vw, 1.1rem);
            padding-bottom: 0.7rem;
            margin-bottom: 1.3rem;
            text-align: center;
            line-height: 1.6;
            font-weight: 600;
            position: relative;
        }
        .sub::after {
            content: "";
            display: block;
            width: 140px;
            height: 3px;
            margin: 0.6rem auto 0;
            background: linear-gradient(90deg, transparent, #ffd166, transparent);
            border-radius: 3px;
        }

        /* ===== شريط الأدوات وعناصر التحكم ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem 1.1rem;
            margin-bottom: 1.4rem;
            padding: 0.9rem 1rem;
            background: linear-gradient(180deg, #1d5f92 0%, #14446b 100%);
            border-radius: 14px;
            border: 2px solid #0c2e4a;
            box-shadow: 0 4px 0 #0a2338, 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
        }

        .toolbar .btn {
            border: none;
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            padding: 0.65rem 1.5rem;
            font-size: clamp(1rem, 1.2vw, 1.15rem);
            font-weight: 800;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.15s ease;
            min-width: 130px;
            text-align: center;
            outline: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            box-shadow: 0 4px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            top: 0;
        }

        .toolbar .btn:active:not(:disabled) {
            top: 3px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .toolbar .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.4);
        }

        /* زر أخضر أساسي (مثل زر المعركة) */
        .toolbar .btn-primary {
            background: linear-gradient(180deg, #8be04a 0%, #4a9e1e 55%, #3d7f17 100%);
            border: 2px solid #2e5f10;
        }

        .toolbar .btn-primary:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        /* زر ذهبي/بنفسجي للنسخ */
        .toolbar .btn-copy {
            background: linear-gradient(180deg, #8a6bff 0%, #5b3fd6 55%, #492fb5 100%);
            border: 2px solid #34208c;
        }

        .toolbar .btn-copy:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        .toolbar .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: clamp(0.88rem, 1.1vw, 1rem);
            color: #eaf4ff;
            font-weight: 600;
            cursor: pointer;
            background: #0d3454;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            border: 2px solid #082238;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }

        .toolbar .checkbox-group:hover {
            background: #124370;
            border-color: #1a5686;
        }

        .toolbar .checkbox-group input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #ffd166;
            cursor: pointer;
            margin: 0;
        }

        .toolbar .checkbox-group .help-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            background: #ffd166;
            border: 1px solid #a5771c;
            color: #3d2600;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: help;
            transition: filter 0.2s;
            user-select: none;
        }

        .toolbar .checkbox-group .help-icon:hover {
            filter: brightness(1.15);
        }

        .error-msg {
            text-align: center;
            color: #ffdcd6;
            font-size: clamp(0.9rem, 1.1vw, 1.05rem);
            margin: 0.4rem 0 1rem;
            padding: 0.6rem 1rem;
            background: linear-gradient(180deg, #7a1f1f, #591414);
            border: 2px solid #ff8a80;
            border-radius: 10px;
            display: none;
            font-weight: 600;
        }

        .error-msg.visible {
            display: block;
        }

        .error-msg .retry-btn {
            background: #ffdcd6;
            border: none;
            color: #7a1f1f;
            padding: 0.2rem 0.9rem;
            font-size: clamp(0.8rem, 0.95vw, 0.88rem);
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 800;
            margin-right: 0.4rem;
            transition: filter 0.2s;
        }

        .error-msg .retry-btn:hover {
            filter: brightness(0.95);
        }

        /* ===== لوحة التشكيلة (إطار مثل واجهة اللعبة) ===== */
        .deck-panel {
            background: linear-gradient(180deg, #1a5c8f 0%, #0f3b5f 100%);
            border: 3px solid #ffd166;
            border-radius: 18px;
            box-shadow: 0 6px 0 #0a2338, 0 10px 20px rgba(0,0,0,0.45), inset 0 0 22px rgba(0,0,0,0.3);
            padding: 1rem 0.8rem 1.2rem;
            margin-bottom: 1.4rem;
            position: relative;
        }

        .deck-panel-title {
            font-family: 'Lalezar', 'Cairo', sans-serif;
            text-align: center;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: #ffe27a;
            text-shadow: 0 2px 0 #7a3f00, 0 3px 4px rgba(0,0,0,0.5);
            margin-bottom: 0.8rem;
            letter-spacing: 0.5px;
        }

        .deck-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
        }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.55rem;
            width: 100%;
            max-width: 520px;
            direction: ltr;
        }

        .deck-container .placeholder-caption {
            width: 100%;
            text-align: center;
            color: #bfe0ff;
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            font-weight: 600;
            padding-top: 0.2rem;
            user-select: none;
        }

        /* ===== بطاقة فارغة (قبل الإنشاء) بنمط خانات المعركة الفارغة ===== */
        .card-slot.empty-slot {
            aspect-ratio: 1 / 1.15;
            background:
                repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 10px, rgba(255,255,255,0) 10px 20px),
                linear-gradient(160deg, #226596, #163f63 60%, #0e2c48);
            border: 2px solid rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.35);
        }

        .card-slot.empty-slot .crown-icon {
            width: 46%;
            height: 46%;
            color: rgba(255, 255, 255, 0.22);
        }

        .card-slot.empty-slot .slot-num {
            position: absolute;
            bottom: 4px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
        }

        /* ===== بطاقة مُنشأة (بعد التوليد) ===== */
        .card-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background: linear-gradient(160deg, #1a4a70, #0e2c48 70%);
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            animation: cardPopIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            direction: rtl;
            border: 2px solid #0a2338;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35);
        }

        .card-slot:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.4), 0 10px 16px rgba(0,0,0,0.45);
        }

        .card-slot.support-card {
            width: 105px;
            margin-top: 0.2rem;
        }

        /* ألوان الندرة - إطار علوي وتوهج مطابق للعبة */
        .card-slot.rarity-common { border-color: #b7c1cc; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(183,193,204,0.35); }
        .card-slot.rarity-rare { border-color: #ff9d2e; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,157,46,0.4), 0 0 10px rgba(255,157,46,0.35); }
        .card-slot.rarity-epic { border-color: #b455e0; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(180,85,224,0.45), 0 0 12px rgba(180,85,224,0.4); }
        .card-slot.rarity-legendary { border-color: #ffd54a; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,213,74,0.5), 0 0 14px rgba(255, 213, 74, 0.5); }
        .card-slot.rarity-champion { border-color: #ffb300; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,179,0,0.55), 0 0 16px rgba(255, 179, 0, 0.55); }
        .card-slot.rarity-support { border-color: #8fd3ff; box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(143,211,255,0.45); }

        .card-art {
            width: 100%;
            aspect-ratio: 1 / 1.02;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.08), transparent 70%);
        }

        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: filter 0.2s ease, opacity 0.2s ease;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }

        .card-slot.animating img {
            filter: blur(4px) opacity(0.5);
        }

        /* شارة تكلفة الإكسير (نقطة أرجوانية) */
        .elixir-badge {
            position: absolute;
            top: -4px;
            left: -4px;
            width: 24px;
            height: 26px;
            background: radial-gradient(ellipse at 35% 30%, #d17bff, #9b2fd6 55%, #6b0fa0 100%);
            border: 2px solid #4a0870;
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            box-shadow: 0 2px 3px rgba(0,0,0,0.5);
            z-index: 5;
        }
        .elixir-badge span {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-45deg);
            color: #fff;
            font-weight: 900;
            font-size: 0.72rem;
            text-shadow: 0 1px 1px rgba(0,0,0,0.6);
        }

        .card-slot .glow-frame {
            position: absolute;
            inset: -2px;
            border-radius: 12px;
            border: 2px solid transparent;
            pointer-events: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            z-index: 10;
        }

        .card-slot .glow-frame.active {
            border-color: #ffe27a;
            box-shadow: 0 0 12px rgba(255, 226, 122, 0.55);
            animation: pulseGlow 0.4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 4px rgba(255, 226, 122, 0.3); }
            100% { box-shadow: 0 0 14px rgba(255, 226, 122, 0.7); }
        }

        .card-slot .card-name {
            font-size: clamp(0.68rem, 0.85vw, 0.8rem);
            line-height: 1.2;
            color: #ffe9b3;
            width: 100%;
            word-break: break-word;
            font-weight: 700;
            text-align: center;
            padding: 0.28rem 3px;
            min-height: 2.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0c2c48, #081b2e);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .card-slot .slot-index {
            display: none;
        }

        .footer {
            margin-top: auto;
            padding: 1.2rem 0.5rem 0.5rem;
            border-top: 2px solid rgba(255, 209, 102, 0.25);
            text-align: center;
            font-size: clamp(0.8rem, 0.95vw, 0.9rem);
            color: #bfe0ff;
            line-height: 1.6;
            direction: rtl;
        }

        .footer a {
            color: #ffe27a;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 700;
        }

        .footer a:hover {
            color: #fff3c4;
        }

        .footer .name {
            font-weight: 800;
            color: #ffe27a;
            font-size: 1.05em;
            font-family: 'Lalezar', 'Cairo', sans-serif;
        }

        .footer .discord {
            color: #bfe0ff;
        }

        .footer .github-link {
            color: #8fbadd;
        }

        .footer .AI {
            color: #6a94b8;
            font-size: 0.82em;
            margin-top: 0.2rem;
        }

        .secret-btn {
            position: fixed;
            bottom: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #123a5c;
            border: 2px solid #ffd166;
            color: #ffd166;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1;
            padding: 0;
            user-select: none;
        }

        .secret-btn:hover {
            background: #1a5686;
        }

        .secret-btn:active {
            transform: scale(0.92);
        }

        @media (max-width: 550px) {
            .deck-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.4rem;
                max-width: 100%;
            }
            .card-slot .card-name {
                font-size: 0.62rem;
                min-height: 2em;
            }
            .card-slot.support-card {
                width: 80px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .toolbar .btn {
                width: 100%;
                min-width: unset;
                padding: 0.6rem;
            }
            .toolbar .checkbox-group {
                justify-content: center;
            }
            .elixir-badge {
                width: 20px;
                height: 22px;
            }
            .elixir-badge span {
                font-size: 0.62rem;
            }
        }

        @keyframes cardPopIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loadingScreen">
        <div id="loadingContent">
            <div id="loadingText">جاري تحميل البطاقات...</div>
            <div>
                <span id="loadingProgress">0%</span>
            </div>
            <div id="loadingBar">
                <div id="loadingBarFill" style="width:0%"></div>
            </div>
            <div id="loadingError">
                <span id="loadingErrorText"></span>
                <button id="loadingRetryBtn">إعادة المحاولة</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="title-banner">
            <h1>منشئ التشكيلات</h1>
        </div>
        <div class="sub">
            <span>أنشئ تشكيلة عشوائية من البطاقات</span>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" id="generateBtn" disabled>إنشاء تشكيلة</button>
            <button class="btn btn-copy" id="copyBtn" disabled>نسخ رابط التشكيلة</button>
            <label class="checkbox-group">
                <input type="checkbox" id="randomIconsCheck" />
                اختيار بواسل و مطورات عشوائيا
                <span class="help-icon"
                      title="عند التفعيل يقوم باختيار بواسل و مطورات بشكل عشوائي ويضعها في التشكيلة"
                      onclick="alert('عند التفعيل يقوم باختيار بواسل و مطورات بشكل عشوائي ويضعها في التشكيلة')">?</span>
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="forceSpellsCheck" />
                إجباري التعويذات
                <span class="help-icon"
                      title="يضع بشكل إجباري تعويذة واحد أو تعويذتين بشكل عشوائي أو قد لا يضع أي تعويذة"
                      onclick="alert('يضع بشكل إجباري تعويذة واحد أو تعويذتين بشكل عشوائي أو قد لا يضع أي تعويذة')">?</span>
            </label>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <div class="deck-panel">
            <div class="deck-panel-title">Battle Deck</div>
            <div id="deckContainer" class="deck-container"></div>
        </div>

        <div class="footer">
            <div class="name">M7mod</div>
            <div class="discord">Discord: _.m6</div>
            <div class="github-link">
                <a href="https://github.com/mhmod3" target="_blank">https://github.com/mhmod3</a>
            </div>
            <div class="AI">*للشفافية: تم إنشاء هذا الموقع بشكل كامل مع Ai</div>
        </div>
    </div>

    <button class="secret-btn" id="secretBtn" title="??">⍰</button>

    <script>
        (function() {
            "use strict";

            const loadingScreen = document.getElementById('loadingScreen');
            const loadingText = document.getElementById('loadingText');
            const loadingProgress = document.getElementById('loadingProgress');
            const loadingBarFill = document.getElementById('loadingBarFill');
            const loadingError = document.getElementById('loadingError');
            const loadingErrorText = document.getElementById('loadingErrorText');
            const loadingRetryBtn = document.getElementById('loadingRetryBtn');

            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const randomIconsCheck = document.getElementById('randomIconsCheck');
            const forceSpellsCheck = document.getElementById('forceSpellsCheck');
            const deckContainer = document.getElementById('deckContainer');
            const errorMsg = document.getElementById('errorMsg');

            let allCards = [];
            let supportCards = [];
            let spells = [];
            let dataLoaded = false;
            let isGenerating = false;
            let lastDeckIds = null;
            const STORAGE_KEY = 'cardsData';
            const preloadedImages = new Map();

            const SPELL_IDS = new Set([
                28000000, 28000001, 28000002, 28000003, 28000004, 28000005,
                28000006, 28000007, 28000008, 28000009, 28000010, 28000011,
                28000012, 28000013, 28000014, 28000015, 28000017, 28000018,
                28000023, 28000024, 28000026
            ]);

            const CROWN_SVG = '<svg class="crown-icon" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg"><path d="M8 68 L14 28 L34 46 L50 14 L66 46 L86 28 L92 68 Z" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';

            // ===== دوال شاشة التحميل =====
            function updateLoadingProgress(loaded, total) {
                const percent = total === 0 ? 100 : Math.round((loaded / total) * 100);
                loadingProgress.textContent = percent + '%';
                loadingBarFill.style.width = percent + '%';
            }

            function showLoadingError(msg) {
                loadingErrorText.textContent = msg;
                loadingError.classList.add('visible');
                loadingRetryBtn.classList.add('visible');
                loadingText.textContent = 'حدث خطأ';
            }

            function hideLoadingError() {
                loadingError.classList.remove('visible');
                loadingRetryBtn.classList.remove('visible');
                loadingText.textContent = 'جاري تحميل البطاقات...';
            }

            function hideLoading() {
                loadingScreen.classList.add('hidden');
            }

            function showLoading() {
                loadingScreen.classList.remove('hidden');
                loadingProgress.textContent = '0%';
                loadingBarFill.style.width = '0%';
                hideLoadingError();
                loadingText.textContent = 'جاري تحميل البطاقات...';
            }

            // ===== تحميل الصور =====
            function loadAllImages(cards) {
                const urls = new Set();
                cards.forEach(card => {
                    if (card.iconUrls) {
                        Object.values(card.iconUrls).forEach(url => {
                            if (url) urls.add(url);
                        });
                    }
                });
                const urlArray = Array.from(urls);
                let loaded = 0;
                const total = urlArray.length;

                return new Promise((resolve) => {
                    if (total === 0) {
                        updateLoadingProgress(100, 100);
                        resolve();
                        return;
                    }

                    let resolved = false;
                    function checkDone() {
                        if (!resolved && loaded === total) {
                            resolved = true;
                            resolve();
                        }
                    }

                    urlArray.forEach(url => {
                        const img = new Image();
                        img.onload = () => {
                            loaded++;
                            updateLoadingProgress(loaded, total);
                            checkDone();
                        };
                        img.onerror = () => {
                            loaded++;
                            updateLoadingProgress(loaded, total);
                            checkDone();
                        };
                        img.src = url;
                        preloadedImages.set(url, img);
                    });
                });
            }

            // ===== معالجة البطاقة =====
            function processCard(card) {
                const iconUrls = card.iconUrls || {};
                const hasHero = iconUrls.hasOwnProperty('heroMedium');
                const hasEvolution = iconUrls.hasOwnProperty('evolutionMedium');
                const availableIcons = ['medium'];
                if (hasHero) availableIcons.push('heroMedium');
                if (hasEvolution) availableIcons.push('evolutionMedium');
                return {
                    ...card,
                    hasHero,
                    hasEvolution,
                    availableIcons,
                    champion: (card.rarity === 'champion'),
                    isSpell: SPELL_IDS.has(card.id)
                };
            }

            // ===== تحميل البيانات (مع تعديل إزالة الرأس غير الضروري) =====
            async function loadData() {
                showLoading();
                generateBtn.disabled = true;
                copyBtn.disabled = true;

                // 1. محاولة قراءة من localStorage
                const stored = localStorage.getItem(STORAGE_KEY);
                let data = null;

                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (parsed && Array.isArray(parsed.items) && parsed.items.length > 0 &&
                            Array.isArray(parsed.supportItems) && parsed.supportItems.length > 0) {
                            data = parsed;
                        }
                    } catch (_) { }
                }

                // 2. إذا لم توجد بيانات مخزنة أو كانت غير صالحة، نجلب من الشبكة
                if (!data) {
                    try {
                        const apiUrl = 'https://raw.githubusercontent.com/mhmod3/cr-deck/refs/heads/main/data.json';
                        // ✅ إزالة الرأس ngrok-skip-browser-warning لتجنب طلب OPTIONS
                        const response = await fetch(apiUrl);
                        if (!response.ok) throw new Error('Network response not ok');
                        data = await response.json();
                        if (!data || !Array.isArray(data.items) || data.items.length === 0 ||
                            !Array.isArray(data.supportItems) || data.supportItems.length === 0) {
                            throw new Error('Invalid data structure');
                        }
                        // تخزين البيانات في localStorage
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    } catch (err) {
                        console.warn('Fetch error:', err);
                        showLoadingError('تعذر تحميل البيانات. تأكد من اتصالك بالإنترنت وحاول مجدداً.');
                        loadingRetryBtn.onclick = function() {
                            hideLoadingError();
                            loadData();
                        };
                        return;
                    }
                }

                // 3. معالجة البيانات وتحميل الصور
                const processedItems = data.items.map(c => processCard(c));
                const processedSupport = data.supportItems.slice();
                const allCardsData = [...processedItems, ...processedSupport];

                await loadAllImages(allCardsData);

                allCards = processedItems.filter(c => !c.isSpell);
                spells = processedItems.filter(c => c.isSpell);
                supportCards = processedSupport;
                dataLoaded = true;

                hideLoading();
                generateBtn.disabled = false;
                showPlaceholder();
                hideError();
            }

            // ===== دوال العرض =====
            function showError(msg, withRetry = false) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('visible');
                if (withRetry) {
                    const retryBtn = document.createElement('button');
                    retryBtn.textContent = 'إعادة المحاولة';
                    retryBtn.className = 'retry-btn';
                    retryBtn.onclick = function(e) {
                        e.stopPropagation();
                        errorMsg.classList.remove('visible');
                        loadData();
                    };
                    errorMsg.appendChild(document.createTextNode(' '));
                    errorMsg.appendChild(retryBtn);
                } else {
                    const oldBtn = errorMsg.querySelector('.retry-btn');
                    if (oldBtn) oldBtn.remove();
                }
            }

            function hideError() {
                errorMsg.classList.remove('visible');
                const oldBtn = errorMsg.querySelector('.retry-btn');
                if (oldBtn) oldBtn.remove();
            }

            function showPlaceholder() {
                deckContainer.innerHTML = '';

                const gridDiv = document.createElement('div');
                gridDiv.className = 'deck-grid';
                for (let i = 0; i < 8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'card-slot empty-slot';
                    slot.innerHTML = CROWN_SVG + `<span class="slot-num">#${i + 1}</span>`;
                    gridDiv.appendChild(slot);
                }
                deckContainer.appendChild(gridDiv);

                const supportSlot = document.createElement('div');
                supportSlot.className = 'card-slot empty-slot support-card';
                supportSlot.innerHTML = CROWN_SVG + `<span class="slot-num">#9</span>`;
                deckContainer.appendChild(supportSlot);

                const caption = document.createElement('div');
                caption.className = 'placeholder-caption';
                caption.textContent = 'اضغط على زر "إنشاء تشكيلة" لإصدار التشكيلة';
                deckContainer.appendChild(caption);

                copyBtn.disabled = true;
                lastDeckIds = null;
            }

            // ===== دوال إنشاء التشكيلة ===== (لم تتغير)
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function pickEightCards(forceSpells) {
                let pool = allCards.slice();
                let shuffled = shuffleArray(pool);
                let selected = shuffled.slice(0, 8);
                let championCount = selected.filter(c => c.champion).length;

                if (championCount <= 2) return selected;

                for (let rep = 0; rep < 3; rep++) {
                    if (championCount <= 2) break;
                    const champIndices = [];
                    selected.forEach((c, idx) => { if (c.champion) champIndices.push(idx); });
                    if (champIndices.length === 0) break;
                    const idxToReplace = champIndices[Math.floor(Math.random() * champIndices.length)];
                    const candidates = pool.filter(c => !c.champion && !selected.includes(c));
                    if (candidates.length === 0) break;
                    const replacement = candidates[Math.floor(Math.random() * candidates.length)];
                    selected[idxToReplace] = replacement;
                    championCount = selected.filter(c => c.champion).length;
                }

                if (championCount <= 2) return selected;
                return null;
            }

            function orderSlots(initialSelection, supportCard, useRandomIcons) {
                let pool = initialSelection.map(item => ({
                    ...item,
                    currentIcon: item.selectedIcon,
                    currentUrl: item.iconUrl
                }));

                function setIcon(item, iconName) {
                    item.currentIcon = iconName;
                    const cardData = item.cardData;
                    if (cardData.iconUrls && cardData.iconUrls[iconName]) {
                        item.currentUrl = cardData.iconUrls[iconName];
                    } else {
                        item.currentUrl = cardData.iconUrls && cardData.iconUrls.medium ? cardData.iconUrls.medium : '';
                    }
                }

                function extractCard(criteria, iconToSetIfFound) {
                    for (let i = 0; i < pool.length; i++) {
                        const item = pool[i];
                        if (criteria(item)) {
                            const removed = pool.splice(i, 1)[0];
                            if (iconToSetIfFound !== null) {
                                setIcon(removed, iconToSetIfFound);
                            }
                            return removed;
                        }
                    }
                    return null;
                }

                const deck = [];

                if (!useRandomIcons) {
                    const champions = [];
                    const normal = [];
                    const special = [];
                    pool.forEach(item => {
                        if (item.isChampion) {
                            champions.push(item);
                        } else if (!item.hasHero && !item.hasEvolution) {
                            normal.push(item);
                        } else {
                            special.push(item);
                        }
                    });

                    shuffleArray(normal);
                    shuffleArray(special);
                    shuffleArray(champions);

                    let slot0 = normal.length > 0 ? normal.splice(0, 1)[0] : (special.length > 0 ? special.splice(0, 1)[0] : champions.splice(0, 1)[0]);
                    setIcon(slot0, 'medium');
                    deck.push(slot0);

                    let slot1 = champions.length > 0 ? champions.splice(0, 1)[0] : (normal.length > 0 ? normal.splice(0, 1)[0] : (special.length > 0 ? special.splice(0, 1)[0] : { ...initialSelection[0] }));
                    setIcon(slot1, 'medium');
                    deck.push(slot1);

                    let slot2 = champions.length > 0 ? champions.splice(0, 1)[0] : (normal.length > 0 ? normal.splice(0, 1)[0] : (special.length > 0 ? special.splice(0, 1)[0] : { ...initialSelection[0] }));
                    setIcon(slot2, 'medium');
                    deck.push(slot2);

                    const remaining = normal.concat(special, champions);
                    shuffleArray(remaining);
                    while (remaining.length > 0) {
                        const item = remaining.splice(0, 1)[0];
                        setIcon(item, 'medium');
                        deck.push(item);
                    }

                    while (deck.length < 8) {
                        const dummy = { ...initialSelection[0] };
                        setIcon(dummy, 'medium');
                        deck.push(dummy);
                    }

                    const supportObj = {
                        cardData: supportCard,
                        selectedIcon: 'medium',
                        currentIcon: 'medium',
                        isChampion: false,
                        hasHero: false,
                        hasEvolution: false,
                        currentUrl: (supportCard.iconUrls && supportCard.iconUrls.medium) ? supportCard.iconUrls.medium : ''
                    };
                    deck.push(supportObj);

                    return deck.map(item => ({
                        cardData: item.cardData,
                        selectedIcon: item.currentIcon,
                        isChampion: item.isChampion || false,
                        hasHero: item.hasHero || false,
                        hasEvolution: item.hasEvolution || false,
                        iconUrl: item.currentUrl || ''
                    }));
                }

                let slot0 = extractCard(item => item.currentIcon === 'evolutionMedium', null);
                if (!slot0) slot0 = extractCard(item => !item.hasEvolution, 'medium');
                if (!slot0) slot0 = extractCard(item => !item.isChampion, 'medium');
                if (!slot0) return null;
                deck.push(slot0);

                let slot1 = extractCard(item => item.currentIcon === 'heroMedium', null);
                if (!slot1) slot1 = extractCard(item => item.isChampion, 'medium');
                if (!slot1) slot1 = extractCard(item => item.currentIcon === 'evolutionMedium', 'medium');
                if (!slot1) slot1 = extractCard(() => true, 'medium');
                deck.push(slot1);

                let slot2 = extractCard(item => item.currentIcon === 'heroMedium', null);
                if (!slot2) slot2 = extractCard(item => item.currentIcon === 'evolutionMedium', null);
                if (!slot2) slot2 = extractCard(item => item.isChampion, 'medium');
                if (!slot2) slot2 = extractCard(() => true, 'medium');
                deck.push(slot2);

                let championInPool = null;
                let championIndex = -1;
                for (let i = 0; i < pool.length; i++) {
                    if (pool[i].isChampion) {
                        championInPool = pool[i];
                        championIndex = i;
                        break;
                    }
                }

                if (championInPool) {
                    let targetSlotIndex = -1;
                    for (const idx of [1, 2]) {
                        const slot = deck[idx];
                        if (!slot.isChampion && !slot.hasHero && !slot.hasEvolution && slot.currentIcon === 'medium') {
                            targetSlotIndex = idx;
                            break;
                        }
                    }
                    if (targetSlotIndex === -1) return null;
                    const replacedCard = deck[targetSlotIndex];
                    setIcon(championInPool, 'medium');
                    deck[targetSlotIndex] = championInPool;
                    pool[championIndex] = replacedCard;
                }

                for (let i = 0; i < 3; i++) {
                    const slot = deck[i];
                    if (slot.currentIcon === 'medium' && (slot.hasHero || slot.hasEvolution)) {
                        let replacementIdx = -1;
                        for (let j = 0; j < pool.length; j++) {
                            if (!pool[j].hasHero && !pool[j].hasEvolution) {
                                replacementIdx = j;
                                break;
                            }
                        }
                        if (replacementIdx === -1) return null;
                        const replacement = pool.splice(replacementIdx, 1)[0];
                        setIcon(replacement, 'medium');
                        pool.push(slot);
                        deck[i] = replacement;
                    }
                }

                let usedHero = 0;
                let usedEvo = 0;
                deck.slice(0, 3).forEach(item => {
                    if (item.currentIcon === 'heroMedium') usedHero++;
                    if (item.currentIcon === 'evolutionMedium') usedEvo++;
                });

                const remainingMedium = [];
                const remainingHero = [];
                const remainingEvo = [];
                while (pool.length > 0) {
                    const item = pool.splice(0, 1)[0];
                    if (item.currentIcon === 'medium') remainingMedium.push(item);
                    else if (item.currentIcon === 'heroMedium') remainingHero.push(item);
                    else if (item.currentIcon === 'evolutionMedium') remainingEvo.push(item);
                    else remainingMedium.push(item);
                }
                shuffleArray(remainingMedium);
                shuffleArray(remainingHero);
                shuffleArray(remainingEvo);

                for (const item of remainingMedium.concat(remainingHero, remainingEvo)) {
                    if (item.currentIcon === 'heroMedium' && usedHero >= 2) setIcon(item, 'medium');
                    else if (item.currentIcon === 'evolutionMedium' && usedEvo >= 2) setIcon(item, 'medium');
                    else if (item.currentIcon === 'heroMedium') usedHero++;
                    else if (item.currentIcon === 'evolutionMedium') usedEvo++;
                    deck.push(item);
                }

                while (deck.length < 8) {
                    const dummy = { ...initialSelection[0] };
                    setIcon(dummy, 'medium');
                    deck.push(dummy);
                }

                const supportObj = {
                    cardData: supportCard,
                    selectedIcon: 'medium',
                    currentIcon: 'medium',
                    isChampion: false,
                    hasHero: false,
                    hasEvolution: false,
                    currentUrl: (supportCard.iconUrls && supportCard.iconUrls.medium) ? supportCard.iconUrls.medium : ''
                };
                deck.push(supportObj);

                return deck.map(item => ({
                    cardData: item.cardData,
                    selectedIcon: item.currentIcon,
                    isChampion: item.isChampion || false,
                    hasHero: item.hasHero || false,
                    hasEvolution: item.hasEvolution || false,
                    iconUrl: item.currentUrl || ''
                }));
            }

            function tryGenerateOnce(useRandomIcons, forceSpells) {
                let eightCards = pickEightCards(forceSpells);
                if (!eightCards) return null;

                if (forceSpells && spells.length > 0) {
                    const numSpells = Math.random() < 0.5 ? 1 : 2;
                    const shuffledSpells = shuffleArray(spells.slice());
                    const selectedSpells = shuffledSpells.slice(0, numSpells);
                    let candidatesForReplacement = eightCards.map((c, idx) => ({ card: c, index: idx }))
                        .filter(item => !item.card.isChampion && !item.card.hasHero && !item.card.hasEvolution);
                    if (candidatesForReplacement.length < numSpells) {
                        candidatesForReplacement = eightCards.map((c, idx) => ({ card: c, index: idx }));
                    }
                    shuffleArray(candidatesForReplacement);
                    const toReplace = candidatesForReplacement.slice(0, numSpells);
                    for (let i = 0; i < toReplace.length; i++) {
                        const idx = toReplace[i].index;
                        eightCards[idx] = selectedSpells[i];
                    }
                }

                const supportIdx = Math.floor(Math.random() * supportCards.length);
                const supportCard = { ...supportCards[supportIdx] };

                let initialSelection = [];
                if (useRandomIcons) {
                    let success = false;
                    let selectedIcons = [];
                    for (let attempt = 0; attempt < 3; attempt++) {
                        selectedIcons = eightCards.map(c => {
                            const avail = c.availableIcons || ['medium'];
                            return avail[Math.floor(Math.random() * avail.length)];
                        });
                        const heroCount = selectedIcons.filter(ic => ic === 'heroMedium').length;
                        const evoCount = selectedIcons.filter(ic => ic === 'evolutionMedium').length;
                        const champCount = eightCards.filter(c => c.champion).length;
                        if (heroCount > 2 || evoCount > 2) continue;
                        if (champCount === 2 && heroCount === 1) continue;
                        if (heroCount === 2 && champCount === 1) continue;
                        if (champCount === 2 && evoCount === 2) continue;
                        success = true;
                        break;
                    }
                    if (!success) return null;

                    initialSelection = eightCards.map((card, idx) => {
                        const icon = selectedIcons[idx];
                        return {
                            cardData: card,
                            selectedIcon: icon,
                            isChampion: card.champion || false,
                            hasHero: card.hasHero || false,
                            hasEvolution: card.hasEvolution || false,
                            iconUrl: (card.iconUrls && card.iconUrls[icon]) ? card.iconUrls[icon] : (card.iconUrls && card.iconUrls.medium ? card.iconUrls.medium : '')
                        };
                    });
                } else {
                    initialSelection = eightCards.map(card => ({
                        cardData: card,
                        selectedIcon: 'medium',
                        isChampion: card.champion || false,
                        hasHero: card.hasHero || false,
                        hasEvolution: card.hasEvolution || false,
                        iconUrl: (card.iconUrls && card.iconUrls.medium) ? card.iconUrls.medium : ''
                    }));
                }

                return orderSlots(initialSelection, supportCard, useRandomIcons);
            }

            // ===== دوال عرض التشكيلة =====
            function animateCardSlot(cardElement, finalSlotData, delay) {
                return new Promise((resolve) => {
                    const img = cardElement.querySelector('img');
                    const nameSpan = cardElement.querySelector('.card-name');
                    const glow = cardElement.querySelector('.glow-frame');
                    const elixirSpan = cardElement.querySelector('.elixir-badge span');

                    glow.classList.add('active');
                    cardElement.classList.add('animating');

                    const allPossibleCards = [...allCards, ...supportCards];
                    let intervalId;
                    let counter = 0;
                    const totalSteps = 12;
                    const stepDuration = 60;

                    function changeStep() {
                        const randomCard = allPossibleCards[Math.floor(Math.random() * allPossibleCards.length)];
                        const randomIcon = randomCard.iconUrls && randomCard.iconUrls.medium ? randomCard.iconUrls.medium : '';
                        img.src = randomIcon;
                        nameSpan.textContent = '???';
                        if (elixirSpan) elixirSpan.textContent = (randomCard.elixirCost !== undefined) ? randomCard.elixirCost : '?';
                        counter++;
                        if (counter >= totalSteps) {
                            clearInterval(intervalId);
                            img.src = finalSlotData.iconUrl || '';
                            nameSpan.textContent = finalSlotData.cardData.name || '---';
                            if (elixirSpan) elixirSpan.textContent = (finalSlotData.cardData.elixirCost !== undefined) ? finalSlotData.cardData.elixirCost : '?';
                            cardElement.classList.remove('animating');
                            setTimeout(() => {
                                glow.classList.remove('active');
                                resolve();
                            }, 200);
                        }
                    }

                    changeStep();
                    intervalId = setInterval(changeStep, stepDuration);

                    setTimeout(() => {
                        if (intervalId) {
                            clearInterval(intervalId);
                            img.src = finalSlotData.iconUrl || '';
                            nameSpan.textContent = finalSlotData.cardData.name || '---';
                            if (elixirSpan) elixirSpan.textContent = (finalSlotData.cardData.elixirCost !== undefined) ? finalSlotData.cardData.elixirCost : '?';
                            cardElement.classList.remove('animating');
                            glow.classList.remove('active');
                            resolve();
                        }
                    }, (totalSteps + 2) * stepDuration + 200);
                });
            }

            function renderDeck(deckSlots) {
                deckContainer.innerHTML = '';
                const ids = [];
                const cardElements = [];

                const gridDiv = document.createElement('div');
                gridDiv.className = 'deck-grid';

                deckSlots.slice(0, 8).forEach((slot, idx) => {
                    const div = createCardElement(slot, idx);
                    gridDiv.appendChild(div);
                    ids.push(slot.cardData.id);
                    cardElements.push({ element: div, finalData: slot });
                });

                deckContainer.appendChild(gridDiv);

                if (deckSlots.length === 9) {
                    const supportSlot = deckSlots[8];
                    const supportDiv = createCardElement(supportSlot, 8);
                    supportDiv.classList.add('support-card');
                    supportDiv.classList.add('rarity-support');
                    deckContainer.appendChild(supportDiv);
                    ids.push(supportSlot.cardData.id);
                    cardElements.push({ element: supportDiv, finalData: supportSlot });
                }

                lastDeckIds = ids;
                copyBtn.disabled = true;

                const promises = cardElements.map((item, index) => {
                    const delay = index * 80;
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            animateCardSlot(item.element, item.finalData, delay).then(resolve);
                        }, delay);
                    });
                });

                Promise.all(promises).then(() => {
                    copyBtn.disabled = false;
                });
            }

            function getRarityClass(rarity) {
                switch (rarity) {
                    case 'common': return 'rarity-common';
                    case 'rare': return 'rarity-rare';
                    case 'epic': return 'rarity-epic';
                    case 'legendary': return 'rarity-legendary';
                    case 'champion': return 'rarity-champion';
                    default: return 'rarity-common';
                }
            }

            function createCardElement(slot, idx) {
                const div = document.createElement('div');
                const rarityClass = getRarityClass(slot.cardData.rarity);
                div.className = 'card-slot ' + rarityClass;

                const glow = document.createElement('div');
                glow.className = 'glow-frame';
                div.appendChild(glow);

                const elixirBadge = document.createElement('div');
                elixirBadge.className = 'elixir-badge';
                const elixirText = document.createElement('span');
                elixirText.textContent = (slot.cardData.elixirCost !== undefined) ? slot.cardData.elixirCost : '?';
                elixirBadge.appendChild(elixirText);
                div.appendChild(elixirBadge);

                const artWrap = document.createElement('div');
                artWrap.className = 'card-art';

                const img = document.createElement('img');
                img.src = slot.iconUrl || '';
                img.alt = slot.cardData.name || 'بطاقة';
                img.loading = 'lazy';
                img.onerror = function() { this.style.display = 'none'; };
                artWrap.appendChild(img);
                div.appendChild(artWrap);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'card-name';
                nameSpan.textContent = slot.cardData.name || '---';
                div.appendChild(nameSpan);

                return div;
            }

            // ===== توليد التشكيلة =====
            function generateDeck() {
                if (!dataLoaded || allCards.length === 0 || supportCards.length === 0) {
                    showError('البيانات غير جاهزة بعد.', true);
                    return;
                }
                if (isGenerating) return;
                isGenerating = true;
                generateBtn.disabled = true;
                copyBtn.disabled = true;
                hideError();

                const useRandomIcons = randomIconsCheck.checked;
                const forceSpells = forceSpellsCheck.checked;
                let finalDeck = null;
                let attempts = 0;

                while (attempts < 3) {
                    attempts++;
                    const result = tryGenerateOnce(useRandomIcons, forceSpells);
                    if (result) {
                        finalDeck = result;
                        break;
                    }
                }

                if (finalDeck && finalDeck.length === 9) {
                    renderDeck(finalDeck);
                    hideError();
                } else {
                    showError('حدث خطأ أثناء إنشاء التشكيلة. يرجى المحاولة مرة أخرى.', false);
                    showPlaceholder();
                }

                isGenerating = false;
                generateBtn.disabled = false;
            }

            // ===== نسخ الرابط =====
            function copyDeck() {
                if (!lastDeckIds || lastDeckIds.length !== 9) return;
                const deckIds = lastDeckIds.slice(0, 8).join(';');
                const supportId = lastDeckIds[8];
                const url = `https://link.clashroyale.com/en/?clashroyale://copyDeck?deck=${deckIds}&l=Royals&tt=${supportId}`;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(() => {
                        copyBtn.textContent = 'تم النسخ!';
                        setTimeout(() => { copyBtn.textContent = 'نسخ رابط التشكيلة'; }, 1500);
                    }).catch(() => fallbackCopy(url));
                } else {
                    fallbackCopy(url);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    copyBtn.textContent = 'تم النسخ!';
                    setTimeout(() => { copyBtn.textContent = 'نسخ رابط التشكيلة'; }, 1500);
                } catch (e) {
                    alert('تعذر نسخ الرابط. يمكنك نسخه يدوياً:\n' + text);
                }
                document.body.removeChild(textarea);
            }

            // ===== ربط الأحداث =====
            generateBtn.addEventListener('click', function() {
                if (!dataLoaded) {
                    loadData();
                    return;
                }
                generateDeck();
            });

            copyBtn.addEventListener('click', copyDeck);

            document.getElementById('secretBtn').addEventListener('click', function() {
                if (confirm('الموسيقى التالية قد تكون محمية بحقوق الطبع والنشر')) {
                    window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank');
                }
            });

            // ===== بدء التحميل عند تحميل الصفحة =====
            window.addEventListener('DOMContentLoaded', loadData);
            window.loadData = loadData;
        })();
    </script>
</body>
</html>
